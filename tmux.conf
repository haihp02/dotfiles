unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

set-option -g focus-events on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Eliminate the delay when pressing Escape (critical for vim feeling responsive)
set -sg escape-time 0

# How long (ms) you can keep repeating a repeatable binding after prefix.
# Default is 500ms — that wide window is what causes prefix+arrow to accidentally
# trigger a repeat-resize when you press the combo too fast a second time.
set -g repeat-time 200

# Pane navigation with prefix + arrow (no repeat flag, so it won't bleed into resize)
bind-key Up    select-pane -U
bind-key Down  select-pane -D
bind-key Left  select-pane -L
bind-key Right select-pane -R

# Pane resizing on prefix + Ctrl+Arrow, with repeat so you can hold it
bind-key -r C-Up    resize-pane -U 5
bind-key -r C-Down  resize-pane -D 5
bind-key -r C-Left  resize-pane -L 5
bind-key -r C-Right resize-pane -R 5

# Open new panes/windows in the same directory
bind '"' split-window -v -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"
bind c   new-window   -c "#{pane_current_path}"

# More intuitive split keys
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Start window and pane index at 1 (easier to reach on keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 10000

# Mouse support
set -g mouse on

# Status bar
set -g status-interval 5
set -g status-left  "[#S] "
set -g status-right "%H:%M %d-%b"

# --- Copy mode ---
setw -g mode-keys vi

# Enter copy mode with prefix+v
bind v copy-mode

# vi-style selection inside copy mode
bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi V   send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y   send-keys -X copy-selection-and-cancel

# Paste with prefix+p from tmux buffer
bind p paste-buffer
